<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>출퇴근일지 - 효진유통</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background-color: #0a0a0a;
        color: #e0e0e0;
        min-height: 100vh;
      }

      /* 헤더 */
      .header {
        background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        border-bottom: 1px solid #222;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        color: #00ff88;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .user-name {
        color: #888;
        font-size: 14px;
      }

      .logout-btn {
        padding: 8px 16px;
        background: transparent;
        border: 1px solid #333;
        border-radius: 6px;
        color: #888;
        cursor: pointer;
        transition: all 0.2s;
      }

      .logout-btn:hover {
        border-color: #ff6b6b;
        color: #ff6b6b;
      }

      /* 메인 컨테이너 */
      .main-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px;
      }

      /* 정보 카드 */
      .info-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .info-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 20px;
      }

      .info-card-label {
        color: #666;
        font-size: 13px;
        margin-bottom: 8px;
      }

      .info-card-value {
        font-size: 24px;
        font-weight: bold;
        color: #00ff88;
      }

      .info-card-value.warning {
        color: #ffd700;
      }

      /* 월 선택 */
      .month-selector {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
      }

      .month-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #222;
        border: none;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .month-btn:hover {
        background: #00ff88;
        color: #000;
      }

      .current-month {
        font-size: 24px;
        font-weight: bold;
        min-width: 180px;
        text-align: center;
      }

      /* 출퇴근 기록 테이블 */
      .attendance-table {
        background: #111;
        border: 1px solid #222;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
      }

      .table-header {
        display: grid;
        grid-template-columns: 100px 1fr 1fr 80px 70px 80px;
        background: #1a1a1a;
        padding: 15px 20px;
        font-weight: 600;
        color: #888;
        font-size: 14px;
      }

      .table-row {
        display: grid;
        grid-template-columns: 100px 1fr 1fr 80px 70px 80px;
        padding: 15px 20px;
        border-top: 1px solid #222;
        align-items: center;
        transition: background 0.2s;
      }

      .table-row:hover {
        background: #1a1a1a;
      }

      .table-row.today {
        background: rgba(0, 255, 136, 0.1);
        border-left: 3px solid #00ff88;
      }

      .table-row.incomplete {
        background: rgba(255, 107, 107, 0.1);
        border-left: 3px solid #ff6b6b;
      }

      .table-row.holiday {
        background: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(255, 255, 255, 0.02) 10px,
          rgba(255, 255, 255, 0.02) 20px
        );
        color: #666;
      }

      .table-row.weekend {
        color: #ff6b6b;
      }

      .date-cell {
        display: flex;
        flex-direction: column;
      }

      .date-main {
        font-weight: 600;
      }

      .date-day {
        font-size: 12px;
        color: #666;
      }

      .time-input-wrapper {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .time-display {
        padding: 8px 12px;
        background: #222;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
        min-width: 80px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .time-display:hover {
        border-color: #00ff88;
      }

      .time-display.empty {
        color: #666;
      }

      .time-display.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .hours-cell {
        font-weight: 600;
        color: #00ff88;
      }

      .status-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .status-badge.complete {
        background: rgba(0, 255, 136, 0.2);
        color: #00ff88;
      }

      .status-badge.incomplete {
        background: rgba(255, 107, 107, 0.2);
        color: #ff6b6b;
      }

      .status-badge.holiday {
        background: rgba(136, 136, 136, 0.2);
        color: #888;
      }

      /* 급여 요약 */
      .salary-summary {
        background: #111;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 30px;
      }

      .salary-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .salary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
      }

      .salary-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        background: #1a1a1a;
        border-radius: 8px;
      }

      .salary-label {
        color: #888;
        font-size: 14px;
      }

      .salary-value {
        font-weight: 600;
        color: #fff;
      }

      .salary-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: linear-gradient(
          135deg,
          rgba(0, 255, 136, 0.1) 0%,
          rgba(0, 255, 136, 0.05) 100%
        );
        border: 1px solid rgba(0, 255, 136, 0.3);
        border-radius: 12px;
      }

      .salary-total-label {
        font-size: 18px;
        font-weight: bold;
      }

      .salary-total-value {
        font-size: 28px;
        font-weight: bold;
        color: #00ff88;
      }

      /* 확정 버튼 */
      .confirm-section {
        text-align: center;
        padding: 30px;
        background: #111;
        border: 1px solid #222;
        border-radius: 12px;
      }

      .confirm-btn {
        padding: 16px 48px;
        background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
        border: none;
        border-radius: 12px;
        color: #000;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }

      .confirm-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
      }

      .confirm-btn:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .confirm-message {
        margin-top: 15px;
        color: #888;
        font-size: 14px;
      }

      .confirmed-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 15px 30px;
        background: rgba(0, 255, 136, 0.1);
        border: 1px solid #00ff88;
        border-radius: 12px;
        color: #00ff88;
        font-size: 16px;
      }

      /* 시간 선택 모달 */
      .time-picker-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .time-picker-modal.show {
        display: flex;
      }

      .time-picker {
        background: #1a1a1a;
        border-radius: 16px;
        padding: 30px;
        min-width: 300px;
        max-width: 90vw;
      }

      .time-picker-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
        text-align: center;
      }

      .time-picker-wheels {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .wheel-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .wheel-label {
        color: #666;
        font-size: 12px;
        margin-bottom: 10px;
      }

      .wheel {
        height: 150px;
        overflow-y: scroll;
        scrollbar-width: none;
        -ms-overflow-style: none;
        background: #222;
        border-radius: 8px;
        padding: 0 10px;
      }

      .wheel::-webkit-scrollbar {
        display: none;
      }

      .wheel-item {
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: #444;
        cursor: pointer;
        transition: all 0.2s;
      }

      .wheel-item.selected {
        color: #00ff88;
        transform: scale(1.2);
      }

      .time-picker-actions {
        display: flex;
        gap: 10px;
      }

      .picker-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .picker-btn.primary {
        background: #00ff88;
        color: #000;
      }

      .picker-btn.secondary {
        background: #333;
        color: #fff;
      }

      /* 경고 메시지 */
      .warning-box {
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid #ff6b6b;
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ff6b6b;
      }

      /* 토스트 */
      .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #222;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 15px 25px;
        display: none;
        align-items: center;
        gap: 10px;
        z-index: 2000;
        animation: slideIn 0.3s ease;
      }

      .toast.show {
        display: flex;
      }

      .toast.success {
        border-color: #00ff88;
      }

      .toast.error {
        border-color: #ff6b6b;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* 로딩 */
      /* [수정] 트렌디한 글래스모피즘 로딩 스타일 (직원용) */
      .loading-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          /* 배경: 아주 옅은 검정 투명 + 블러 처리 */
          background: rgba(0, 0, 0, 0.3);
          backdrop-filter: blur(15px); /* 배경 흐림 효과 */
          -webkit-backdrop-filter: blur(15px);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease;
      }

      .loading-overlay.show {
          opacity: 1;
          visibility: visible;
      }

      .progress-container {
          position: relative;
          width: 120px;
          height: 120px;
          display: flex;
          justify-content: center;
          align-items: center;
      }

      .progress-ring {
          transform: rotate(-90deg);
      }

      .progress-ring__circle {
          stroke-dasharray: 327;
          stroke-dashoffset: 327;
          transition: stroke-dashoffset 0.1s ease;
          stroke-linecap: round;
      }

      /* 중앙 텍스트 컨테이너 */
      .progress-text-container {
          position: absolute;
          text-align: center;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      .loading-label {
          font-size: 14px;
          color: #fff; /* 흰색 텍스트 */
          font-weight: 500;
          margin-bottom: 2px;
          text-transform: uppercase;
          letter-spacing: 1px;
      }

      .loading-percent {
          font-size: 18px;
          font-weight: bold;
          color: #00ff88; /* 시그니처 네온 컬러 */
          font-family: 'Roboto', sans-serif;
          text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); /* 네온 효과 */
      }

      /* 수정요청 버튼 스타일 */
      .edit-request-btn {
        padding: 4px 8px;
        background: #ffd700;
        border: none;
        border-radius: 4px;
        color: #000;
        cursor: pointer;
        font-size: 11px;
        white-space: nowrap;
        font-weight: 500;
      }

      .edit-request-btn:hover {
        background: #ffed4a;
      }

      .pending-badge {
        color: #ffd700;
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 3px;
      }

      /* 반응형 - 모바일에서 수정요청 보이게 수정 */
      @media (max-width: 768px) {
        .table-header,
        .table-row {
          grid-template-columns: 70px 1fr 1fr 50px 50px 60px;
          padding: 12px 10px;
          font-size: 12px;
        }

        .table-header > div,
        .table-row > div {
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .time-display {
          padding: 6px 8px;
          min-width: 60px;
          font-size: 12px;
        }

        .status-badge {
          padding: 2px 6px;
          font-size: 10px;
        }

        .edit-request-btn {
          padding: 3px 5px;
          font-size: 10px;
        }

        .pending-badge {
          font-size: 10px;
        }

        .info-cards {
          grid-template-columns: 1fr 1fr;
        }

        .salary-grid {
          grid-template-columns: 1fr;
        }

        .date-day {
          font-size: 10px;
        }

        .hours-cell {
          font-size: 12px;
        }
      }

      @media (max-width: 480px) {
        .table-header,
        .table-row {
          grid-template-columns: 60px 1fr 1fr 45px 45px 55px;
          padding: 10px 8px;
          font-size: 11px;
          gap: 4px;
        }

        .time-display {
          padding: 4px 6px;
          min-width: 50px;
          font-size: 11px;
        }
      }

      /* 24시간 시간 입력 스타일 */
      .time-input-24h {
        width: 100%;
        padding: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        font-size: 18px;
        text-align: center;
        font-family: monospace;
      }

      .time-input-24h:focus {
        outline: none;
        border-color: #00ff88;
      }

      .time-input-group {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
      }

      .time-input-group select {
        padding: 10px 15px;
        background: #222;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        min-width: 70px;
        text-align: center;
      }

      .time-input-group select:focus {
        outline: none;
        border-color: #00ff88;
      }

      .time-separator {
        font-size: 24px;
        color: #666;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <!-- 헤더 -->
    <header class="header">
      <div class="logo">⚡ 효진유통</div>
      <div class="user-info">
        <span class="user-name" id="userName">로딩중...</span>
        <button class="logout-btn" onclick="location.href='/logout'">
          로그아웃
        </button>
      </div>
    </header>

    <!-- 메인 -->
    <main class="main-container">
      <!-- 정보 카드 -->
      <div class="info-cards">
        <div class="info-card">
          <div class="info-card-label">💰 시급</div>
          <div class="info-card-value" id="hourlyWage">0원</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">📆 소정근로일</div>
          <div class="info-card-value" style="font-size: 16px" id="scheduledDays">
            <span style="display: flex; gap: 4px; justify-content: center; flex-wrap: wrap;">-</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-label">⏰ 소정근로시간</div>
          <div class="info-card-value" style="font-size: 14px; line-height: 1.6;" id="scheduledHoursDisplay">
            09:00 ~ 18:00
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-label">📅 이번달 출근일</div>
          <div class="info-card-value" id="workDays">0일</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">⏱️ 이번달 총 근무시간</div>
          <div class="info-card-value" id="totalHours">0시간</div>
        </div>
      </div>

      <!-- 월 선택 -->
      <div class="month-selector">
        <button class="month-btn" onclick="changeMonth(-1)">◀</button>
        <span class="current-month" id="currentMonth">2025년 1월</span>
        <button class="month-btn" onclick="changeMonth(1)">▶</button>
      </div>

      <!-- 경고 메시지 -->
      <div class="warning-box" id="warningBox" style="display: none">
        <span>⚠️</span>
        <span id="warningMessage"></span>
      </div>

      <!-- 출퇴근 기록 -->
      <div class="attendance-table">
        <div class="table-header">
          <div>날짜</div>
          <div>출근</div>
          <div>퇴근</div>
          <div>시간</div>
          <div>상태</div>
          <div>수정</div>
        </div>
        <div id="attendanceList">
          <!-- 동적 생성 -->
        </div>
      </div>

      <!-- 급여 요약 -->
      <div class="salary-summary">
        <div class="salary-title">💵 이번달 급여 내역</div>
        <div class="salary-grid">
          <div class="salary-item">
            <span class="salary-label">기본급</span>
            <span class="salary-value" id="basePay">0원</span>
          </div>
          <div class="salary-item">
            <span class="salary-label">초과근무 수당</span>
            <span class="salary-value" id="overtimePay">0원</span>
          </div>
          <div class="salary-item">
            <span class="salary-label">주휴수당</span>
            <span class="salary-value" id="weeklyPay">0원</span>
          </div>
          <div class="salary-item">
            <span class="salary-label">만근수당</span>
            <span class="salary-value" id="fullBonus">0원</span>
          </div>
        </div>
        <div class="salary-total">
            <span class="salary-total-label">총 지급 예정액</span>
            <span class="salary-total-value" id="totalPay">0원</span>
        </div>
        
        <!-- 계산 과정 상세 -->
        <div id="salaryDetail" style="margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 8px; font-size: 13px; color: #888; display: none;">
        </div>
    </div>
      </div>

      <!-- 확정 섹션 -->
      <div class="confirm-section" id="confirmSection">
        <div id="confirmContent">
          <!-- 동적 생성 -->
        </div>
      </div>
    </main>

    <!-- 시간 선택 모달 -->
    <div class="time-picker-modal" id="timePickerModal">
      <div class="time-picker">
        <div class="time-picker-title" id="pickerTitle">출근 시간 선택</div>
        <div class="time-picker-wheels">
          <div class="wheel-container">
            <div class="wheel-label">시</div>
            <div class="wheel" id="hourWheel">
              <!-- 동적 생성 -->
            </div>
          </div>
          <div class="wheel-container">
            <div class="wheel-label">분</div>
            <div class="wheel" id="minuteWheel">
              <!-- 동적 생성 -->
            </div>
          </div>
        </div>
        <div class="time-picker-actions">
          <button class="picker-btn secondary" onclick="closeTimePicker()">
            취소
          </button>
          <button class="picker-btn primary" onclick="confirmTime()">
            확인
          </button>
        </div>
      </div>
    </div>

    <!-- 수정 요청 모달 - 24시간제 시간 선택 UI로 변경 -->
    <div class="time-picker-modal" id="editRequestModal">
      <div class="time-picker" style="max-width: 400px;">
        <div class="time-picker-title">📝 출퇴근 수정 요청</div>
        <div id="editRequestDateDisplay" style="text-align: center; color: #00ff88; font-size: 16px; margin-bottom: 15px;"></div>
        
        <div style="margin-bottom: 15px;">
          <div style="color: #888; font-size: 13px; margin-bottom: 8px;">기존 기록</div>
          <div style="display: flex; gap: 20px; justify-content: center;">
            <div style="background: #222; padding: 10px 20px; border-radius: 8px;">
              <div style="color: #666; font-size: 12px;">출근</div>
              <div id="editOldClockIn" style="color: #ff6b6b;">--:--</div>
            </div>
            <div style="background: #222; padding: 10px 20px; border-radius: 8px;">
              <div style="color: #666; font-size: 12px;">퇴근</div>
              <div id="editOldClockOut" style="color: #ff6b6b;">--:--</div>
            </div>
          </div>
        </div>
        
        <div style="margin-bottom: 15px;">
          <div style="color: #888; font-size: 13px; margin-bottom: 8px;">수정 요청 시간 (24시간제)</div>
          <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
              <label style="color: #666; font-size: 12px; display: block; margin-bottom: 5px;">출근</label>
              <div class="time-input-group">
                <select id="editNewClockInHour">
                  <!-- 0-23 시간 옵션 -->
                </select>
                <span class="time-separator">:</span>
                <select id="editNewClockInMin">
                  </select>
              </div>
            </div>
            <div style="flex: 1;">
              <label style="color: #666; font-size: 12px; display: block; margin-bottom: 5px;">퇴근</label>
              <div class="time-input-group">
                <select id="editNewClockOutHour">
                  </select>
                <span class="time-separator">:</span>
                <select id="editNewClockOutMin"> 
                  </select>
              </div>
            </div>
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="color: #888; font-size: 13px; display: block; margin-bottom: 8px;">수정 사유 <span style="color: #ff6b6b;">*</span></label>
          <textarea id="editReason" rows="3" placeholder="수정이 필요한 사유를 입력해주세요" style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; resize: none;"></textarea>
        </div>
        
        <!-- 숨겨진 날짜 입력 -->
        <input type="hidden" id="editRequestDate" value="">
        
        <div class="time-picker-actions">
          <button class="picker-btn secondary" onclick="closeEditRequestModal()">취소</button>
          <button class="picker-btn primary" onclick="submitEditRequest()">수정 요청</button>
        </div>
      </div>
    </div>

    <!-- 거절 알림 모달 -->
    <div class="time-picker-modal" id="rejectionModal">
      <div class="time-picker" style="max-width: 400px;">
        <div class="time-picker-title" style="color: #ff6b6b;">❌ 수정 요청 거절</div>
        <div id="rejectionDate" style="text-align: center; color: #888; font-size: 14px; margin-bottom: 15px;"></div>
        
        <div style="background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
          <div style="color: #ff6b6b; font-size: 13px; margin-bottom: 8px;">거절 사유</div>
          <div id="rejectionReason" style="color: #e0e0e0; font-size: 14px; line-height: 1.5;"></div>
        </div>
        
        <div class="time-picker-actions">
          <button class="picker-btn primary" onclick="closeRejectionModal()">확인</button>
        </div>
      </div>
    </div>

    <!-- 토스트 -->
    <div class="toast" id="toast">
      <span id="toastIcon">✅</span>
      <span id="toastMessage"></span>
    </div>

    <!-- 로딩 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="progress-container">
        <svg class="progress-ring" width="120" height="120">
          <circle
            class="progress-ring__circle-bg"
            stroke="rgba(255,255,255,0.1)"
            stroke-width="8"
            fill="transparent"
            r="52"
            cx="60"
            cy="60"
          />
          <circle
            class="progress-ring__circle"
            id="progressCircle"
            stroke="#00ff88"
            stroke-width="8"
            fill="transparent"
            r="52"
            cx="60"
            cy="60"
          />
        </svg>
        <div class="progress-text-container">
          <div class="loading-label">Loading</div>
          <div class="loading-percent" id="loadingPercent">0%</div>
        </div>
      </div>
    </div>

    <script>
      // 상태
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth() + 1;
      let attendanceData = null;
      let salaryData = null;
      let selectedDate = null;
      let selectedType = null; // 'in' or 'out'
      let selectedHour = 9;
      let selectedMinute = 0;

      // 초기화
      // [수정] 초기 로딩 시 모든 데이터를 기다리도록 변경
      document.addEventListener("DOMContentLoaded", async () => {
        showLoading(); // 1. 로딩 시작
  
        try {
          // 병렬로 세션 정보와 출퇴근 기록(내부에 월급 계산 포함)을 가져옴
          await Promise.all([
              loadSessionInfo(),
              loadAttendance() 
          ]);
    
          // UI 초기화
          initTimeWheels();
          initEditRequestTimeSelects();
    
        } catch (e) {
          console.error("초기화 오류:", e);
        } finally {
          hideLoading(); // 2. 모든 작업이 끝나면 로딩 종료
        }
      });

      // 24시간제 시간 선택 초기화 (1분 단위 수정)
      function initEditRequestTimeSelects() {
        // 시간 (0-23)
        const hourSelects = ['editNewClockInHour', 'editNewClockOutHour'];
        hourSelects.forEach(selectId => {
          const select = document.getElementById(selectId);
          select.innerHTML = '';
          for (let h = 0; h < 24; h++) {
            const option = document.createElement('option');
            option.value = String(h).padStart(2, '0');
            option.textContent = String(h).padStart(2, '0');
            select.appendChild(option);
          }
        });

        // [수정됨] 분 (0-59) - 1분 단위로 생성
        const minSelects = ['editNewClockInMin', 'editNewClockOutMin'];
        minSelects.forEach(selectId => {
          const select = document.getElementById(selectId);
          select.innerHTML = '';
          for (let m = 0; m < 60; m++) {
            const option = document.createElement('option');
            option.value = String(m).padStart(2, '0');
            option.textContent = String(m).padStart(2, '0');
            select.appendChild(option);
          }
        });
      }

      // 세션 정보 로드
      async function loadSessionInfo() {
        try {
          const response = await fetch("/api/session");
          const data = await response.json();
          document.getElementById("userName").textContent =
            data.user_name + "님";
        } catch (error) {
          console.error("세션 로드 실패:", error);
        }
      }

      // 출퇴근 데이터 로드
      // [수정] 출퇴근 데이터 로드 (월급 계산까지 기다림)
      async function loadAttendance() {
        showLoading(); // 로딩 시작
  
        try {
          const response = await fetch(
            `/api/attendance?year=${currentYear}&month=${currentMonth}`
          );
          attendanceData = await response.json();

          if (attendanceData.success) {
            document.getElementById("hourlyWage").textContent =
              formatNumber(attendanceData.hourly_wage) + "원";
      
            // 소정근로일 표시 로직
            const scheduledDays = attendanceData.scheduled_days || '1,2,3,4,5';
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayOrder = [1, 2, 3, 4, 5, 6, 0];
            const selectedDays = scheduledDays.split(',').map(d => parseInt(d));
            let daysHtml = '';
            dayOrder.forEach(dayNum => {
              const isSelected = selectedDays.includes(dayNum);
              const bgColor = isSelected ? '#00ff88' : '#333';
              const textColor = isSelected ? '#000' : '#666';
              daysHtml += `<span style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: ${bgColor}; color: ${textColor}; border-radius: 6px; font-size: 12px; font-weight: 600;">${dayNames[dayNum]}</span>`;
            });
            document.getElementById("scheduledDays").innerHTML = `<span style="display: flex; gap: 4px; justify-content: center; flex-wrap: wrap;">${daysHtml}</span>`;
      
            // 소정근로시간 표시 로직
            const scheduledHoursData = attendanceData.scheduled_hours || {};
            const timeGroups = {};
            selectedDays.forEach(dayNum => {
              const sch = scheduledHoursData[String(dayNum)] || {};
              const start = sch.start || '09:00';
              const end = sch.end || '18:00';
              const key = start + '~' + end;
              if (!timeGroups[key]) timeGroups[key] = [];
              timeGroups[key].push(dayNum);
            });
            function formatDayGroup(days) {
              const order = [1,2,3,4,5,6,0];
              const sorted = [...days].sort((a, b) => order.indexOf(a) - order.indexOf(b));
              if (sorted.length === 1) return dayNames[sorted[0]];
              const indices = sorted.map(d => order.indexOf(d));
              const isConsecutive = indices.every((v, i) => i === 0 || v === indices[i-1] + 1);
              if (isConsecutive && sorted.length > 2) return dayNames[sorted[0]] + '~' + dayNames[sorted[sorted.length-1]];
              return sorted.map(d => dayNames[d]).join(',');
            }
            const hoursLines = Object.entries(timeGroups).map(([timeKey, days]) =>
              formatDayGroup(days) + ' ' + timeKey.replace('~', ' ~ ')
            );
            const hoursEl = document.getElementById('scheduledHoursDisplay');
            if (hoursEl) hoursEl.textContent = hoursLines.join(' / ');

            updateMonthDisplay();

            await checkMyEditRequests();
            renderAttendanceTable();
      
            // [핵심 수정] 월급 데이터가 다 로드될 때까지 기다림 (await 추가)
            await loadSalary(); 
      
          } else {
            showToast("error", attendanceData.error || "데이터 로드 실패");
          }
        } catch (error) {
          console.error(error);
          showToast("error", "서버 연결 오류");
        } finally {
          // [핵심 수정] 성공하든 실패하든 마지막에 로딩 끔 (안전장치)
          hideLoading(); 
        }
      }

      // 급여 계산 로드
      async function loadSalary() {
        try {
          const response = await fetch(
            `/api/salary/calculate?year=${currentYear}&month=${currentMonth}`
          );
          salaryData = await response.json();

          if (salaryData.success) {
            renderSalary(salaryData.breakdown);
            document.getElementById("workDays").textContent =
              salaryData.breakdown.work_days + "일";
            document.getElementById("totalHours").textContent =
              salaryData.breakdown.total_hours + "시간";
            checkConfirmButton();
            document.getElementById("warningBox").style.display = "none";
          } else if (salaryData.error === "INCOMPLETE_RECORDS") {
            document.getElementById("warningBox").style.display = "flex";
            document.getElementById(
              "warningMessage"
            ).textContent = `출퇴근 기록이 불완전합니다: ${salaryData.incomplete_dates.join(
              ", "
            )}`;
            renderSalary({
              base_pay: 0,
              overtime_pay: 0,
              weekly_holiday_pay: 0,
              full_attendance_bonus: 0,
              total_pay: 0,
            });
          }
        } catch (error) {
          console.error("급여 계산 실패:", error);
        }
      }

      // 월 변경
      function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 12) {
          currentMonth = 1;
          currentYear++;
        } else if (currentMonth < 1) {
          currentMonth = 12;
          currentYear--;
        }
        loadAttendance();
      }

      function updateMonthDisplay() {
        document.getElementById(
          "currentMonth"
        ).textContent = `${currentYear}년 ${currentMonth}월`;
      }

      // 출퇴근 테이블 렌더링
      function renderAttendanceTable() {
        const container = document.getElementById("attendanceList");
        const today = new Date().toISOString().split("T")[0];
        const todayObj = new Date();
        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        const holidays = new Set(attendanceData.holidays || []);
        const recordsMap = {};

        (attendanceData.records || []).forEach((r) => {
          recordsMap[r.work_date] = r;
        });
        
        // 대기 중인 요청 맵
        const pendingRequestsMap = {};
        (attendanceData.pendingRequests || []).forEach((r) => {
          pendingRequestsMap[r.request_date] = r;
        });

        // 현재 월인지 확인
        const isCurrentMonth = currentYear === todayObj.getFullYear() && currentMonth === (todayObj.getMonth() + 1);
        const isPastMonth = currentYear < todayObj.getFullYear() || 
                           (currentYear === todayObj.getFullYear() && currentMonth < (todayObj.getMonth() + 1));

        // 현재 달의 첫째 주 계산 (이전 달 마지막 주 수정 허용용)
        const firstDayOfCurrentMonth = new Date(todayObj.getFullYear(), todayObj.getMonth(), 1);
        let daysUntilSunday = (7 - firstDayOfCurrentMonth.getDay()) % 7;
        if (daysUntilSunday === 0 && firstDayOfCurrentMonth.getDay() !== 0) {
            daysUntilSunday = 7;
        }
        const firstSunday = new Date(firstDayOfCurrentMonth);
        firstSunday.setDate(firstDayOfCurrentMonth.getDate() + daysUntilSunday);
        const firstWeekMonday = new Date(firstSunday);
        firstWeekMonday.setDate(firstSunday.getDate() - 6);

        let html = "";

        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = `${currentYear}-${String(currentMonth).padStart(
            2,
            "0"
          )}-${String(day).padStart(2, "0")}`;
          const dateObj = new Date(currentYear, currentMonth - 1, day);
          const dayOfWeek = dateObj.getDay();
          const dayNames = ["일", "월", "화", "수", "목", "금", "토"];

          const record = recordsMap[dateStr];
          const isToday = dateStr === today;
          const isHoliday = holidays.has(dateStr);
          const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
          const isOff = isHoliday || isWeekend;
          const hasRecord = record && (record.clock_in || record.clock_out);
          const isIncomplete =
            record &&
            ((record.clock_in && !record.clock_out) ||
              (!record.clock_in && record.clock_out));
          
          // 수정 가능 여부: 오늘 날짜는 항상 수정 가능, 다른 날짜는 is_editable 체크
          const isEditable = isToday || (record && record.is_editable);
          const isPast = dateStr < today && !hasRecord;
          const isPastDate = dateStr < today;

          let rowClass = "table-row";
          if (isToday) rowClass += " today";
          if (isIncomplete) rowClass += " incomplete";
          if (isPast && isOff) rowClass += " holiday";
          if (isWeekend) rowClass += " weekend";

          // 근무시간 계산
          let hours = "-";
          if (record && record.clock_in && record.clock_out) {
            const [inH, inM] = record.clock_in.split(":").map(Number);
            const [outH, outM] = record.clock_out.split(":").map(Number);
            let totalMin = outH * 60 + outM - (inH * 60 + inM);
            // 점심시간 공제
            if (inH < 13 && outH >= 12) {
              totalMin -= 60;
            }
            hours = (totalMin / 60).toFixed(1) + "h";
          }

          // 상태
          let status = "";
          if (hasRecord) {
            if (isIncomplete) {
              status = '<span class="status-badge incomplete">미완료</span>';
            } else {
              status = '<span class="status-badge complete">완료</span>';
            }
          } else if (isPast && isOff) {
            status = '<span class="status-badge holiday">휴무</span>';
          } else if (isPast) {
            status = '<span class="status-badge holiday">미출근</span>';
          }

          // 출퇴근 시간 표시
          const clockInDisplay = record?.clock_in
            ? record.clock_in.substring(0, 5)
            : "--:--";
          const clockOutDisplay = record?.clock_out
            ? record.clock_out.substring(0, 5)
            : "--:--";

          // 직접 수정 가능 여부: 오늘은 항상 가능, 그 외는 승인 필요
          const canEdit =
            !attendanceData.is_confirmed &&
            isToday &&
            dateStr <= today;

          // 수정요청 버튼 표시 여부
          // 조건: (당월 과거 날짜 OR 이전달이지만 현재달 첫째주에 속하는 날짜) + 급여 미확정
          const hasPendingRequest = !!pendingRequestsMap[dateStr];
          const isInCurrentMonthFirstWeek = isPastMonth && dateObj >= firstWeekMonday && dateObj <= firstSunday;
          const canRequestEdit = ((isCurrentMonth && isPastDate && !isToday) || isInCurrentMonthFirstWeek) && !attendanceData.is_confirmed;
          
          let editRequestBtn = "";
          if (canRequestEdit) {
            if (hasPendingRequest) {
              editRequestBtn = '<span class="pending-badge">⏳ 대기</span>';
            } else {
              editRequestBtn = `<button class="edit-request-btn" onclick="openEditRequestModal('${dateStr}', '${record?.clock_in || ''}', '${record?.clock_out || ''}')">수정요청</button>`;
            }
          } else if (isToday) {
            editRequestBtn = '<span style="color: #00ff88; font-size: 11px;">오늘</span>';
          } else if (isPastMonth) {
            editRequestBtn = '<span style="color: #666; font-size: 11px;">-</span>';
          }

          html += `
                    <div class="${rowClass}" data-date="${dateStr}">
                        <div class="date-cell">
                            <span class="date-main">${day}일</span>
                            <span class="date-day">${dayNames[dayOfWeek]}${
            isHoliday ? " 휴" : ""
          }</span>
                        </div>
                        <div class="time-input-wrapper">
                            <div class="time-display ${
                              !record?.clock_in ? "empty" : ""
                            } ${!canEdit ? "disabled" : ""}" 
                                 onclick="${
                                   canEdit
                                     ? `openTimePicker('${dateStr}', 'in', '${
                                         record?.clock_in || "09:00"
                                       }')`
                                     : ""
                                 }"
                                 ${
                                   !canEdit
                                     ? 'title="오늘만 직접 수정 가능"'
                                     : ""
                                 }>
                                ${clockInDisplay}
                            </div>
                        </div>
                        <div class="time-input-wrapper">
                            <div class="time-display ${
                              !record?.clock_out ? "empty" : ""
                            } ${!canEdit ? "disabled" : ""}"
                                 onclick="${
                                   canEdit
                                     ? `openTimePicker('${dateStr}', 'out', '${
                                         record?.clock_out || "18:00"
                                       }')`
                                     : ""
                                 }"
                                 ${
                                   !canEdit
                                     ? 'title="오늘만 직접 수정 가능"'
                                     : ""
                                 }>
                                ${clockOutDisplay}
                            </div>
                        </div>
                        <div class="hours-cell">${hours}</div>
                        <div>${status}</div>
                        <div style="text-align: center;">${editRequestBtn}</div>
                    </div>
                `;
        }

        container.innerHTML = html;
      }

      // 급여 렌더링
      function renderSalary(breakdown) {
          document.getElementById('basePay').textContent = formatNumber(breakdown.base_pay) + '원';
          document.getElementById('overtimePay').textContent = formatNumber(breakdown.overtime_pay) + '원';
          document.getElementById('weeklyPay').textContent = formatNumber(breakdown.weekly_holiday_pay) + '원';
          document.getElementById('fullBonus').textContent = formatNumber(breakdown.full_attendance_bonus) + '원';
          document.getElementById('totalPay').textContent = formatNumber(breakdown.total_pay) + '원';
    
          // 계산 과정 상세 표시
          const detailEl = document.getElementById('salaryDetail');
          if (breakdown.total_pay > 0) {
              const hourlyWage = breakdown.hourly_wage || attendanceData?.hourly_wage || 10700;
              const totalRegular = breakdown.total_regular_hours || 0;
              const totalOvertime = breakdown.total_overtime_hours || 0;
              
              // 주휴수당 주별 상세 내역 생성
              let weeklyDetailHtml = '';
              if (salaryData.weekly_details && salaryData.weekly_details.length > 0) {
                  weeklyDetailHtml = salaryData.weekly_details.map((week) => {
                      const [, sm, sd] = week.week_start.split('-');
                      const [, em, ed] = week.week_end.split('-');
                      const statusIcon = week.is_eligible ? '✅' : '❌';
                      const reasonText = week.reason ? `(${week.reason})` : '';
                      
                      if (week.is_eligible) {
                          return `<div style="background: #222; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;">
                              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                  <span style="color: #fff; font-size: 13px;">${parseInt(sm)}/${parseInt(sd)} ~ ${parseInt(em)}/${parseInt(ed)}</span>
                                  <span style="color: #00ff88; font-size: 12px;">${statusIcon} 지급</span>
                              </div>
                              <div style="color: #888; font-size: 12px;">• ${week.total_hours}시간 근무 (${week.work_days}일)</div>
                              <div style="color: #00ff88; font-size: 12px;">• ${week.total_hours}h ÷ 5 × ${formatNumber(hourlyWage)}원 = <strong>${formatNumber(week.holiday_pay)}원</strong></div>
                          </div>`;
                      } else {
                          return `<div style="background: #222; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; opacity: 0.6;">
                              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                  <span style="color: #fff; font-size: 13px;">${parseInt(sm)}/${parseInt(sd)} ~ ${parseInt(em)}/${parseInt(ed)}</span>
                                  <span style="color: #ff6b6b; font-size: 12px;">${statusIcon} 미지급 ${reasonText}</span>
                              </div>
                              <div style="color: #888; font-size: 12px;">• ${week.total_hours}시간 근무 (${week.work_days}일)</div>
                          </div>`;
                      }
                  }).join('');
              }

      // 확정 버튼 체크
      function checkConfirmButton() {
        const container = document.getElementById("confirmContent");

        if (attendanceData.is_confirmed) {
          container.innerHTML = `
                    <div class="confirmed-badge">
                        ✅ ${attendanceData.year_month} 급여가 확정되었습니다
                    </div>
                    <p class="confirm-message">확정일: ${new Date(
                      attendanceData.confirmation_data?.confirmed_at
                    ).toLocaleString()}</p>
                `;
          return;
        }

        // 마지막날 체크
        const today = new Date();
        const lastDay = new Date(currentYear, currentMonth, 0).getDate();
        const isLastDay =
          today.getDate() === lastDay &&
          today.getMonth() + 1 === currentMonth &&
          today.getFullYear() === currentYear;

        // 불완전 기록 체크
        const hasIncomplete =
          salaryData && salaryData.error === "INCOMPLETE_RECORDS";

        // 이번달이 아니면 숨김
        const isCurrentMonth =
          currentMonth === new Date().getMonth() + 1 &&
          currentYear === new Date().getFullYear();

        if (!isCurrentMonth) {
          container.innerHTML = `<p class="confirm-message">이번달이 아닌 달의 급여는 확정할 수 없습니다.</p>`;
          return;
        }

        if (hasIncomplete) {
          container.innerHTML = `
                    <button class="confirm-btn" disabled>🔒 월급 확정</button>
                    <p class="confirm-message" style="color: #ff6b6b;">출퇴근 기록이 불완전하여 확정할 수 없습니다.</p>
                `;
          return;
        }

        if (isLastDay || today.getDate() > lastDay) {
          container.innerHTML = `
                    <button class="confirm-btn" onclick="confirmSalary()">✅ 월급 확정</button>
                    <p class="confirm-message">위 급여 내역에 동의하고 확정합니다.</p>
                `;
        } else {
          container.innerHTML = `
                    <button class="confirm-btn" disabled>🔒 월급 확정</button>
                    <p class="confirm-message">월급 확정은 ${lastDay}일(마지막날)부터 가능합니다.</p>
                `;
        }
      }

      // 월급 확정
      async function confirmSalary() {
        if (
          !confirm(
            "이번달 급여 내역에 동의하고 확정하시겠습니까?\n확정 후에는 출퇴근 기록을 수정할 수 없습니다."
          )
        ) {
          return;
        }

        showLoading();
        try {
          const response = await fetch("/api/salary/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ year: currentYear, month: currentMonth }),
          });

          const result = await response.json();

          if (result.success) {
            showToast("success", "월급이 확정되었습니다!");
            loadAttendance();
          } else {
            showToast("error", result.error || "확정 실패");
          }
        } catch (error) {
          showToast("error", "서버 오류");
        }
        hideLoading();
      }

      // 시간 선택 모달
      function initTimeWheels() {
        const hourWheel = document.getElementById("hourWheel");
        const minuteWheel = document.getElementById("minuteWheel");

        // 시간 (0-23)
        let hourHtml = '<div style="height: 50px;"></div>';
        for (let h = 0; h < 24; h++) {
          hourHtml += `<div class="wheel-item" data-value="${h}" onclick="selectHour(${h})">${String(
            h
          ).padStart(2, "0")}</div>`;
        }
        hourHtml += '<div style="height: 50px;"></div>';
        hourWheel.innerHTML = hourHtml;

        // 분 (0-59)
        let minHtml = '<div style="height: 50px;"></div>';
        for (let m = 0; m < 60; m += 1) {
            minHtml += `<div class="wheel-item" data-value="${m}" onclick="selectMinute(${m})">${String(m).padStart(2, "0")}</div>`;
        }
        minHtml += '<div style="height: 50px;"></div>';
        minuteWheel.innerHTML = minHtml;
      }

      function openTimePicker(date, type, currentTime) {
        selectedDate = date;
        selectedType = type;

        const [h, m] = (currentTime || "09:00").split(":").map(Number);
        selectedHour = h;
        selectedMinute = m;

        document.getElementById("pickerTitle").textContent =
          type === "in" ? "출근 시간 선택" : "퇴근 시간 선택";

        updateWheelSelection();
        document.getElementById("timePickerModal").classList.add("show");
      }

      function closeTimePicker() {
        document.getElementById("timePickerModal").classList.remove("show");
      }

      function selectHour(h) {
        selectedHour = h;
        updateWheelSelection();
      }

      function selectMinute(m) {
        selectedMinute = m;
        updateWheelSelection();
      }

      function updateWheelSelection() {
        document.querySelectorAll('#hourWheel .wheel-item').forEach(el => {
           el.classList.toggle('selected', parseInt(el.dataset.value) === selectedHour);
        });
        document.querySelectorAll('#minuteWheel .wheel-item').forEach(el => {
           el.classList.toggle('selected', parseInt(el.dataset.value) === selectedMinute);
        });
    
        // 스크롤 위치 - 선택된 항목을 중앙에 위치 (scrollIntoView 사용)
        requestAnimationFrame(() => {
            const hourWheel = document.getElementById('hourWheel');
            const selectedHourEl = hourWheel.querySelector('.wheel-item.selected');
            if (selectedHourEl) {
                selectedHourEl.scrollIntoView({ block: 'center', behavior: 'instant' });
            }
        
            const minuteWheel = document.getElementById('minuteWheel');
            const selectedMinEl = minuteWheel.querySelector('.wheel-item.selected');
            if (selectedMinEl) {
                selectedMinEl.scrollIntoView({ block: 'center', behavior: 'instant' });
            }
        });
      }

      async function confirmTime() {
        const timeStr = `${String(selectedHour).padStart(2, "0")}:${String(
          selectedMinute
        ).padStart(2, "0")}`;

        // 기존 기록 찾기
        const record =
          (attendanceData.records || []).find(
            (r) => r.work_date === selectedDate
          ) || {};

        const payload = {
          work_date: selectedDate,
          clock_in: selectedType === "in" ? timeStr : record.clock_in,
          clock_out: selectedType === "out" ? timeStr : record.clock_out,
        };

        showLoading();
        closeTimePicker();

        try {
          const response = await fetch("/api/attendance", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const result = await response.json();

          if (result.success) {
            showToast("success", "저장되었습니다");
            loadAttendance();
          } else {
            showToast("error", result.error || "저장 실패");
          }
        } catch (error) {
          showToast("error", "서버 오류");
        }
        hideLoading();
      }

      // 유틸리티
      function formatNumber(num) {
        return (num || 0).toLocaleString();
      }

      // ==================== [신규] 스마트 로딩 애니메이션 로직 ====================
      let loadingInterval;
      let currentProgress = 0;
      const CIRCLE_CIRCUMFERENCE = 327; // SVG 원의 둘레 (r=52일 때)

      function setProgress(percent) {
          const circle = document.getElementById('progressCircle');
          const text = document.getElementById('loadingPercent');
          if (!circle || !text) return;

          currentProgress = percent;
          text.textContent = `${Math.round(percent)}%`;

          // offset 계산: 100%일 때 offset이 0이 되어야 함
          const offset = CIRCLE_CIRCUMFERENCE - (percent / 100 * CIRCLE_CIRCUMFERENCE);
          circle.style.strokeDashoffset = offset;
      }

      function showLoading() {
          const overlay = document.getElementById("loadingOverlay");
          if (!overlay) return;

          // 기존 진행 중인 로딩이 있다면 초기화
          clearInterval(loadingInterval);
          setProgress(0);
          overlay.classList.add("show");

          // 자연스러운 로딩 시뮬레이션
          // 0~30%: 빠르게, 30~70%: 보통, 70~95%: 느리게, 95%에서 멈춤
          loadingInterval = setInterval(() => {
              let increment = 0;
              if (currentProgress < 30) {
                  increment = Math.random() * 5; // 아주 빠름
              } else if (currentProgress < 70) {
                  increment = Math.random() * 2; // 보통
              } else if (currentProgress < 95) {
                  increment = Math.random() * 0.5; // 아주 느림
              } else {
                  // 95% 이상이면 멈춰서 실제 데이터 기다림
                  increment = 0; 
              }
        
              let nextProgress = currentProgress + increment;
              if (nextProgress >= 99) nextProgress = 99; 
              setProgress(nextProgress);
        
          }, 100); // 0.1초마다 업데이트
      }

      function hideLoading() {
          const overlay = document.getElementById("loadingOverlay");
          if (!overlay) return;

          clearInterval(loadingInterval);
    
          // 완료 시 순간적으로 100% 보여줌
          setProgress(100);
      
          // 유저가 "100%"를 볼 수 있도록 0.3초 정도 기다렸다가 사라짐
          setTimeout(() => {
              overlay.classList.remove("show");
              // 완전히 사라진 후 다음을 위해 0%로 초기화
              setTimeout(() => {
                   setProgress(0);
              }, 300);
          }, 300);
      }
      // ===================================================================

      function showToast(type, message) {
        const toast = document.getElementById("toast");
        const icon = document.getElementById("toastIcon");
        const msg = document.getElementById("toastMessage");

        icon.textContent = type === "success" ? "✅" : "❌";
        msg.textContent = message;
        toast.className = `toast show ${type}`;

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      // ==================== 수정 요청 관련 ====================

      function openEditRequestModal(dateStr, oldClockIn, oldClockOut) {
        // 날짜 저장 (hidden input에)
        document.getElementById('editRequestDate').value = dateStr;
        
        // 날짜 표시
        const [y, m, d] = dateStr.split('-');
        document.getElementById('editRequestDateDisplay').textContent = `${parseInt(m)}월 ${parseInt(d)}일`;
        
        // 기존 기록 표시
        document.getElementById('editOldClockIn').textContent = oldClockIn ? oldClockIn.substring(0, 5) : '--:--';
        document.getElementById('editOldClockOut').textContent = oldClockOut ? oldClockOut.substring(0, 5) : '--:--';
        
        // 시간 선택 초기화 (24시간제)
        const inTime = oldClockIn ? oldClockIn.substring(0, 5) : '09:00';
        const outTime = oldClockOut ? oldClockOut.substring(0, 5) : '18:00';
        
        const [inH, inM] = inTime.split(':');
        const [outH, outM] = outTime.split(':');
        
        document.getElementById('editNewClockInHour').value = inH;
        document.getElementById('editNewClockInMin').value = inM;
        document.getElementById('editNewClockOutHour').value = outH;
        document.getElementById('editNewClockOutMin').value = outM;
        
        document.getElementById('editReason').value = '';
        
        document.getElementById('editRequestModal').classList.add('show');
      }

      function closeEditRequestModal() {
        document.getElementById('editRequestModal').classList.remove('show');
      }

      async function submitEditRequest() {
        // hidden input에서 날짜 가져오기
        const requestDate = document.getElementById('editRequestDate').value;
        
        // 24시간제 시간 값 조합
        const inHour = document.getElementById('editNewClockInHour').value;
        const inMin = document.getElementById('editNewClockInMin').value;
        const outHour = document.getElementById('editNewClockOutHour').value;
        const outMin = document.getElementById('editNewClockOutMin').value;
        
        const newClockIn = `${inHour}:${inMin}`;
        const newClockOut = `${outHour}:${outMin}`;
        const reason = document.getElementById('editReason').value.trim();
        
        // 유효성 검사
        if (!requestDate) {
          showToast('error', '날짜 정보가 없습니다. 다시 시도해주세요.');
          return;
        }
        
        if (!reason) {
          showToast('error', '수정 사유를 입력해주세요');
          return;
        }
        
        showLoading();
        closeEditRequestModal();
        
        try {
          const response = await fetch('/api/attendance-edit-request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              request_date: requestDate,
              new_clock_in: newClockIn,
              new_clock_out: newClockOut,
              reason: reason
            })
          });
          
          const result = await response.json();
          
          if (result.success) {
            showToast('success', '수정 요청이 전송되었습니다');
            loadAttendance();
          } else {
            showToast('error', result.error || '요청 실패');
          }
        } catch (error) {
          showToast('error', '서버 오류');
        }
        hideLoading();
      }

      // 거절 알림 모달
      let currentRejectionId = null;

      function showRejectionModal(rejection) {
        currentRejectionId = rejection.id;
        
        const [y, m, d] = rejection.request_date.split('-');
        document.getElementById('rejectionDate').textContent = `${parseInt(m)}월 ${parseInt(d)}일 수정 요청`;
        document.getElementById('rejectionReason').textContent = rejection.reject_reason;
        
        document.getElementById('rejectionModal').classList.add('show');
      }

      async function closeRejectionModal() {
        if (currentRejectionId) {
          try {
            await fetch(`/api/attendance-edit-request/${currentRejectionId}/viewed`, {
              method: 'POST'
            });
          } catch (e) {
            console.error('확인 처리 실패:', e);
          }
        }
        document.getElementById('rejectionModal').classList.remove('show');
        currentRejectionId = null;
      }

      // 내 수정 요청 확인 (거절된 것 표시)
      async function checkMyEditRequests() {
        try {
          const response = await fetch('/api/attendance-edit-requests/my');
          const result = await response.json();
          
          if (result.success) {
            // 미확인 거절 요청이 있으면 모달 표시
            if (result.rejected_unviewed && result.rejected_unviewed.length > 0) {
              showRejectionModal(result.rejected_unviewed[0]);
            }
            
            // 대기 중인 요청 저장
            if (attendanceData) {
              attendanceData.pendingRequests = result.pending || [];
            }
          }
        } catch (error) {
          console.error('수정 요청 확인 실패:', error);
        }
      }
    </script>
